## Analysis options for DoonWalkers
## Suitable for a team Flutter project: strict but not pedantic.
## See https://dart.dev/guides/language/analysis-options

include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint

  # Treat these as errors so CI hard-fails on them.
  errors:
    missing_required_param: error
    missing_return: error
    invalid_annotation_target: ignore  # needed for riverpod_annotation

  exclude:
    - "**/*.g.dart"   # generated files
    - "**/*.freezed.dart"

linter:
  rules:
    # --- Style ---
    prefer_single_quotes: true
    always_use_package_imports: true
    directives_ordering: true
    sort_child_properties_last: true

    # --- Safety ---
    avoid_dynamic_calls: true
    avoid_print: true          # use a logger instead
    unawaited_futures: true
    cancel_subscriptions: true
    close_sinks: true

    # --- Clean code ---
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_fields: true
    prefer_final_locals: true
    unnecessary_lambdas: true
    avoid_unnecessary_containers: true

    # --- Docs (warn, not error — relaxed for rapid dev phases) ---
    # public_member_api_docs: true  # enable when publishing
