name: doon_walkers
description: "DoonWalkers — the official app for the Doon Walkers trekking community."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.9.0

  # Environment / config
  flutter_dotenv: ^5.2.1

  # Typography
  google_fonts: ^6.2.1

  # Launching external URLs (Instagram, WhatsApp, mailto/tel)
  url_launcher: ^6.3.1

  # Picking a cover image for admin trek forms (mobile-first choice —
  # see Phase 4 report for the image_picker vs file_picker call)
  image_picker: ^1.1.2
  video_player: ^2.10.1
  chewie: ^1.12.1

  # Trek Library grid — card height driven by content (description
  # length varies per trek) rather than a fixed aspect ratio; see the
  # trek_library_screen.dart comment on why a plain GridView can't do
  # this without either overflowing or wasting space.
  flutter_staggered_grid_view: ^0.7.0

  # Phase 8 — push notifications (FCM). firebase_core must be
  # initialized before any other Firebase plugin; firebase_messaging is
  # the FCM client; flutter_local_notifications displays a heads-up
  # banner while the app is in the foreground, since FCM's own
  # `notification` payload is only auto-displayed by the OS when the
  # app is backgrounded/terminated — see notification_service.dart.
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.5.3
  health: ^13.1.3
  permission_handler: ^12.0.3
  material_symbols_icons: ^4.2960.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - .env
