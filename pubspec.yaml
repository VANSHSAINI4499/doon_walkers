name: doon_walkers
description: "DoonWalkers — the official app for the Doon Walkers trekking community."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.9.0

  # Environment / config
  flutter_dotenv: ^5.2.1

  # Typography
  google_fonts: ^6.2.1

  # Launching external URLs (Instagram, WhatsApp, mailto/tel)
  url_launcher: ^6.3.1

  # Picking a cover image for admin trek forms (mobile-first choice —
  # see Phase 4 report for the image_picker vs file_picker call)
  image_picker: ^1.1.2
  video_player: ^2.10.1
  chewie: ^1.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - .env
