org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Kotlin's incremental compiler computes relative paths between its
# cache dir (under this project, on E:) and plugin sources (pub cache,
# on C:) — a cross-drive relative path has no common root on Windows,
# which crashes the daemon (IllegalArgumentException: "this and base
# files have different roots") the moment a new native Kotlin plugin
# (health, permission_handler — Version 2 Challenges Module pivot) is
# added. Non-incremental compilation sidesteps the relative-path logic
# entirely; build is a little slower, not broken.
kotlin.incremental=false
